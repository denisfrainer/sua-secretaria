name: Oracle Scraper

on:
  schedule:
    - cron: '0 9 * * *' # 06:00 AM Floripa
  workflow_dispatch:

jobs:
  run-oracle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip' # Silicon Tweak: Cache automático de dependências

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/scrapers/requirements.txt

      - name: Run Oracle Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: 1 # Garante que os logs apareçam em tempo real
        run: python scripts/scrapers/oracle.py