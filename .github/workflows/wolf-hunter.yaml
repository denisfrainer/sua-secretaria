name: Wolf Hunter

on:
  schedule:
    # Executa todas as segundas e quartas às 10:00 UTC (07:00 da manhã no Brasil)
    - cron: '0 10 * * 1,3'
  workflow_dispatch: # Permite-lhe executar o script manualmente clicando num botão no GitHub

jobs:
  morning-hunt:
    runs-on: ubuntu-latest # A máquina virtual gratuita que o GitHub nos empresta
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/scrapers/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Executar o Scraper Wolf Hunter
        env:
          # É aqui que o GitHub injeta os segredos de forma segura no script
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd scripts/scrapers
          python wolf_hunter.py