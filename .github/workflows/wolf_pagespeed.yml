name: 🐺 Wolf PageSpeed Hunter

on:
  schedule:
    # Roda a cada 30 minutos. Processa 20 leads por hora (seguro pro limite do Google).
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite rodar manualmente clicando num botão no GitHub

jobs:
  audit-pagespeed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Pode ajustar para a sua versão se preferir

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Lobo PageSpeed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_PAGESPEED_KEY: ${{ secrets.GOOGLE_PAGESPEED_KEY }}
        # Ajuste o caminho abaixo se o seu script não estiver na raiz do repositório
        run: python scripts/scrapers/wolf_pagespeed.py