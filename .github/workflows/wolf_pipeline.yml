name: Wolf Agent Pipeline

on:
  workflow_dispatch: # Permite acionar manualmente pelo painel do GitHub
  schedule:
    - cron: '0 10 * * 1-5' # Executa às 10h UTC (07h em Florianópolis) de Seg a Sex

jobs:
  execute_pipeline:
    runs-on: ubuntu-latest
    
    env: # Puxa as variáveis cadastradas nos Secrets do repositório
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai supabase python-dotenv

      - name: Run Wolf Hunter (Mineração)
        run: python scripts/scrapers/wolf_hunter.py

      - name: Run Wolf Sniper (Auditoria e Pitch)
        run: python scripts/scrapers/wolf_agent.py