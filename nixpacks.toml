[phases.setup]
nixPkgs = ["python3", "python3Packages.pip", "gcc", "nodejs_20"]

[phases.install]
# Instalamos as dependências de Python e Node
cmds = [
  "python3 -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt",
  "npm install"
]

[phases.build]
# Build do TypeScript da Eliza
cmds = ["npm run build"]

[phases.start]
# Override the start phase to boot both the web server and the polling engine
cmd = 'npx concurrently "next start -p $PORT" "npx tsx scripts/agents/eliza-worker.ts"'